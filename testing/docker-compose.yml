services:
  etf-backtest:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    command: python run_full_backtest.py
    environment:
      LLM_CONFIG_PATH: ${LLM_CONFIG_PATH:-/app/zai_llm_config.json}
      LLM_PROVIDER: ${LLM_PROVIDER:-nvidia}
      LLM_API_KEY: ${LLM_API_KEY:-}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://integrate.api.nvidia.com/v1/}
      LLM_CHAT_COMPLETIONS_URL: ${LLM_CHAT_COMPLETIONS_URL:-https://integrate.api.nvidia.com/v1/chat/completions}
      LLM_MODEL: ${LLM_MODEL:-z-ai/glm4.7}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-180}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-1024}
      LLM_MAX_RETRIES: ${LLM_MAX_RETRIES:-4}
      LLM_RETRY_SLEEP_SECONDS: ${LLM_RETRY_SLEEP_SECONDS:-10}
      LLM_SUCCESS_SLEEP_SECONDS: ${LLM_SUCCESS_SLEEP_SECONDS:-0}
      REGIME_CSV_PATH: ${REGIME_CSV_PATH:-/app/regime_weights.csv}
      OUT_ROOT: ${OUT_ROOT:-/app/out_nvidia_k10}
      TOP_K_VALUES: ${TOP_K_VALUES:-10}
      REBUILD_RANKS: ${REBUILD_RANKS:-0}
      RUN_A0_A1_A5: ${RUN_A0_A1_A5:-1}
      RUN_LLM: ${RUN_LLM:-1}
      RUN_LLM_PARALLEL: ${RUN_LLM_PARALLEL:-1}
      RUN_A6: ${RUN_A6:-1}
      A6_MODE: ${A6_MODE:-both}
    volumes:
      - .:/app
