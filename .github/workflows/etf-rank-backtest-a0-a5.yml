name: ETF Rank Backtest 2024 KOFR Decision-Regime Resume

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/etf-rank-backtest-a0-a5.yml"
      - "KOFR_20260508.xlsx"
      - "testing/*.py"
      - "testing/regime_weights.csv"
      - "testing/backtest_state/chunk_state_2024_decision_*.json"
      - "testing/backtest_state/non_llm_state_2024_decision.json"

permissions:
  contents: write
  actions: write

concurrency:
  group: etf-rank-backtest-2024-kofr-decision-regime
  cancel-in-progress: false

env:
  REGIME_CSV_PATH: regime_weights.csv
  KOFR_XLSX_PATH: ../KOFR_20260508.xlsx
  OUT_ROOT: backtest_state/out_2024_kofr_decision_regime_a0_a6_k10
  A2_STATE_PATH: backtest_state/chunk_state_2024_decision_a2a_a2b.json
  A3_STATE_PATH: backtest_state/chunk_state_2024_decision_a3_a4.json
  NON_LLM_STATE_PATH: backtest_state/non_llm_state_2024_decision.json
  START_DECISION_DATE: "2024-01-05"
  END_DECISION_DATE: "2026-05-07"
  TOP_K_VALUES: "10"
  MONTHS_PER_RUN: "6"

jobs:
  prepare-ranks:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      phase: ${{ steps.plan.outputs.phase }}
      should_run: ${{ steps.plan.outputs.should_run }}
      start_month: ${{ steps.plan.outputs.start_month }}
      end_month: ${{ steps.plan.outputs.end_month }}
      first_month: ${{ steps.plan.outputs.first_month }}
      last_month: ${{ steps.plan.outputs.last_month }}
      state_path: ${{ steps.plan.outputs.state_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip pandas numpy openpyxl

      - name: Rebuild rank panel
        working-directory: testing
        run: |
          python -u 01_make_market_corr_rank.py
          python -u 02_make_flow_price_rank.py
          python -u 03_make_rotation_rank.py
          python -u 04_merge_rank_panel.py

      - name: Determine next phase and chunk
        id: plan
        working-directory: testing
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p backtest_state

          python -u determine_next_backtest_chunk.py \
            --rank-panel rank_panel.csv \
            --state-path "$A2_STATE_PATH" \
            --months-per-run "$MONTHS_PER_RUN" \
            --start-date "$START_DECISION_DATE" \
            --end-date "$END_DECISION_DATE" > a2.env

          a2_should="$(grep '^should_run=' a2.env | cut -d= -f2-)"
          if [ "$a2_should" = "1" ]; then
            phase="a2"
            cp a2.env selected.env
            state_path="$A2_STATE_PATH"
          else
            python -u determine_next_backtest_chunk.py \
              --rank-panel rank_panel.csv \
              --state-path "$A3_STATE_PATH" \
              --months-per-run "$MONTHS_PER_RUN" \
              --start-date "$START_DECISION_DATE" \
              --end-date "$END_DECISION_DATE" > a3.env
            a3_should="$(grep '^should_run=' a3.env | cut -d= -f2-)"
            if [ "$a3_should" = "1" ]; then
              phase="a3"
              cp a3.env selected.env
              state_path="$A3_STATE_PATH"
            elif [ ! -f "$NON_LLM_STATE_PATH" ]; then
              phase="nonllm"
              cp a3.env selected.env
              state_path="$NON_LLM_STATE_PATH"
            else
              phase="final"
              cp a3.env selected.env
              state_path="$NON_LLM_STATE_PATH"
            fi
          fi

          cat selected.env
          echo "phase=$phase" >> "$GITHUB_OUTPUT"
          echo "state_path=$state_path" >> "$GITHUB_OUTPUT"
          cat selected.env >> "$GITHUB_OUTPUT"

      - name: Show plan
        run: |
          echo "phase=${{ steps.plan.outputs.phase }}"
          echo "should_run=${{ steps.plan.outputs.should_run }}"
          echo "start_month=${{ steps.plan.outputs.start_month }}"
          echo "end_month=${{ steps.plan.outputs.end_month }}"
          echo "available=${{ steps.plan.outputs.first_month }}..${{ steps.plan.outputs.last_month }}"

      - name: Upload rebuilt ranks
        uses: actions/upload-artifact@v4
        with:
          name: rebuilt-ranks-${{ github.run_id }}
          path: |
            testing/market_rank.csv
            testing/flow_rank.csv
            testing/flow_rank_metadata.json
            testing/flow_rank_no_selected_actor_report.csv
            testing/rotation_rank.csv
            testing/rank_panel.csv
            testing/regime_weights.csv
          if-no-files-found: error
          retention-days: 14

  a2-llm-backtest-chunk:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    needs: prepare-ranks
    if: needs.prepare-ranks.outputs.phase == 'a2'
    name: A2 LLM ${{ matrix.llm_strategy }} ${{ needs.prepare-ranks.outputs.start_month }}..${{ needs.prepare-ranks.outputs.end_month }}
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        llm_strategy: [A2a, A2b]
    env: &llm_env
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      LLM_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      LLM_CONFIG_PATH: .no_local_llm_config.json
      LLM_PROVIDER: nvidia
      LLM_BASE_URL: https://integrate.api.nvidia.com/v1/
      LLM_CHAT_COMPLETIONS_URL: https://integrate.api.nvidia.com/v1/chat/completions
      LLM_MODEL: z-ai/glm4.7
      LLM_TIMEOUT_SECONDS: "180"
      LLM_MAX_TOKENS: "2048"
      LLM_MAX_RETRIES: "12"
      LLM_RETRY_SLEEP_SECONDS: "30"
      LLM_SUCCESS_SLEEP_SECONDS: "2"
      LLM_RESPONSE_FORMAT: '{"type":"json_object"}'
      LLM_CHAT_TEMPLATE_KWARGS: '{"enable_thinking":false}'
      LLM_FAIL_ON_FALLBACK: "0"
      LLM_VALIDATION_RETRIES: "8"
      LLM_PROGRESS_INTERVAL: "10"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip pandas numpy openpyxl

      - name: Validate NVIDIA secret
        run: |
          if [ -z "$NVIDIA_API_KEY" ]; then
            echo "NVIDIA_API_KEY repository secret is required."
            exit 1
          fi

      - name: Download rebuilt ranks
        uses: actions/download-artifact@v4
        with:
          name: rebuilt-ranks-${{ github.run_id }}
          path: testing

      - name: Run six-month A2 LLM backtest chunk
        working-directory: testing
        run: |
          python -u run_monthly_strategy_backtest.py \
            --strategy "${{ matrix.llm_strategy }}" \
            --rank-panel rank_panel.csv \
            --out-root "$OUT_ROOT" \
            --top-k "$TOP_K_VALUES" \
            --start-month "${{ needs.prepare-ranks.outputs.start_month }}" \
            --end-month "${{ needs.prepare-ranks.outputs.end_month }}" \
            --start-date "$START_DECISION_DATE" \
            --end-date "$END_DECISION_DATE"

      - name: Upload A2 LLM state for commit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: etf-rank-llm-state-${{ matrix.llm_strategy }}-${{ github.run_id }}
          path: testing/backtest_state/out_2024_kofr_decision_regime_a0_a6_k10/${{ matrix.llm_strategy }}_k10/
          if-no-files-found: error
          retention-days: 14

  commit-a2-state:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [prepare-ranks, a2-llm-backtest-chunk]
    if: needs.prepare-ranks.outputs.phase == 'a2'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Download A2a state
        uses: actions/download-artifact@v4
        with:
          name: etf-rank-llm-state-A2a-${{ github.run_id }}
          path: testing/backtest_state/out_2024_kofr_decision_regime_a0_a6_k10/A2a_k10

      - name: Download A2b state
        uses: actions/download-artifact@v4
        with:
          name: etf-rank-llm-state-A2b-${{ github.run_id }}
          path: testing/backtest_state/out_2024_kofr_decision_regime_a0_a6_k10/A2b_k10

      - name: Update A2 chunk state
        run: |
          python - <<'PY'
          import json, os, time
          from pathlib import Path
          state_path = Path("testing") / os.environ["A2_STATE_PATH"]
          state_path.parent.mkdir(parents=True, exist_ok=True)
          state = {
              "last_completed_start_month": os.environ["START_MONTH"],
              "last_completed_end_month": os.environ["END_MONTH"],
              "months_per_run": int(os.environ["MONTHS_PER_RUN"]),
              "start_decision_date": os.environ["START_DECISION_DATE"],
              "end_decision_date": os.environ["END_DECISION_DATE"],
              "phase": "a2a_a2b",
              "out_root": "testing/backtest_state/out_2024_kofr_decision_regime_a0_a6_k10",
              "run_id": os.environ["GITHUB_RUN_ID"],
              "updated_at": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
          }
          state_path.write_text(json.dumps(state, ensure_ascii=False, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY
        env:
          START_MONTH: ${{ needs.prepare-ranks.outputs.start_month }}
          END_MONTH: ${{ needs.prepare-ranks.outputs.end_month }}

      - name: Commit A2 state
        id: commit_state
        run: &commit_and_push |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add testing/backtest_state
          if git diff --cached --quiet; then
            echo "No backtest state changes to commit."
            echo "committed=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "$COMMIT_MESSAGE"
          git pull --rebase --autostash origin "${{ github.ref_name }}"
          git push origin "HEAD:${{ github.ref_name }}"
          echo "committed=1" >> "$GITHUB_OUTPUT"
        env:
          COMMIT_MESSAGE: "ci: save decision-regime A2 state through ${{ needs.prepare-ranks.outputs.end_month }}"

      - name: Trigger next phase or chunk
        if: steps.commit_state.outputs.committed == '1'
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
        run: &dispatch_next |
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/etf-rank-backtest-a0-a5.yml/dispatches" \
            -d "{\"ref\":\"${REF_NAME}\"}"

  a3-llm-backtest-chunk:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    needs: prepare-ranks
    if: needs.prepare-ranks.outputs.phase == 'a3'
    name: A3/A4 LLM ${{ matrix.llm_strategy }} ${{ needs.prepare-ranks.outputs.start_month }}..${{ needs.prepare-ranks.outputs.end_month }}
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        llm_strategy: [A3, A4]
    env: *llm_env
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip pandas numpy openpyxl

      - name: Validate NVIDIA secret
        run: |
          if [ -z "$NVIDIA_API_KEY" ]; then
            echo "NVIDIA_API_KEY repository secret is required."
            exit 1
          fi

      - name: Download rebuilt ranks
        uses: actions/download-artifact@v4
        with:
          name: rebuilt-ranks-${{ github.run_id }}
          path: testing

      - name: Run six-month A3/A4 LLM backtest chunk
        working-directory: testing
        run: |
          python -u run_monthly_strategy_backtest.py \
            --strategy "${{ matrix.llm_strategy }}" \
            --rank-panel rank_panel.csv \
            --out-root "$OUT_ROOT" \
            --top-k "$TOP_K_VALUES" \
            --start-month "${{ needs.prepare-ranks.outputs.start_month }}" \
            --end-month "${{ needs.prepare-ranks.outputs.end_month }}" \
            --start-date "$START_DECISION_DATE" \
            --end-date "$END_DECISION_DATE"

      - name: Upload A3/A4 LLM state for commit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: etf-rank-llm-state-${{ matrix.llm_strategy }}-${{ github.run_id }}
          path: testing/backtest_state/out_2024_kofr_decision_regime_a0_a6_k10/${{ matrix.llm_strategy }}_k10/
          if-no-files-found: error
          retention-days: 14

  commit-a3-state:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [prepare-ranks, a3-llm-backtest-chunk]
    if: needs.prepare-ranks.outputs.phase == 'a3'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Download A3 state
        uses: actions/download-artifact@v4
        with:
          name: etf-rank-llm-state-A3-${{ github.run_id }}
          path: testing/backtest_state/out_2024_kofr_decision_regime_a0_a6_k10/A3_k10

      - name: Download A4 state
        uses: actions/download-artifact@v4
        with:
          name: etf-rank-llm-state-A4-${{ github.run_id }}
          path: testing/backtest_state/out_2024_kofr_decision_regime_a0_a6_k10/A4_k10

      - name: Update A3/A4 chunk state
        run: |
          python - <<'PY'
          import json, os, time
          from pathlib import Path
          state_path = Path("testing") / os.environ["A3_STATE_PATH"]
          state_path.parent.mkdir(parents=True, exist_ok=True)
          state = {
              "last_completed_start_month": os.environ["START_MONTH"],
              "last_completed_end_month": os.environ["END_MONTH"],
              "months_per_run": int(os.environ["MONTHS_PER_RUN"]),
              "start_decision_date": os.environ["START_DECISION_DATE"],
              "end_decision_date": os.environ["END_DECISION_DATE"],
              "phase": "a3_a4",
              "out_root": "testing/backtest_state/out_2024_kofr_decision_regime_a0_a6_k10",
              "run_id": os.environ["GITHUB_RUN_ID"],
              "updated_at": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
          }
          state_path.write_text(json.dumps(state, ensure_ascii=False, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY
        env:
          START_MONTH: ${{ needs.prepare-ranks.outputs.start_month }}
          END_MONTH: ${{ needs.prepare-ranks.outputs.end_month }}

      - name: Commit A3/A4 state
        id: commit_state
        run: *commit_and_push
        env:
          COMMIT_MESSAGE: "ci: save decision-regime A3/A4 state through ${{ needs.prepare-ranks.outputs.end_month }}"

      - name: Trigger next phase or chunk
        if: steps.commit_state.outputs.committed == '1'
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
        run: *dispatch_next

  non-llm-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: prepare-ranks
    if: needs.prepare-ranks.outputs.phase == 'nonllm'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip pandas numpy openpyxl

      - name: Download rebuilt ranks
        uses: actions/download-artifact@v4
        with:
          name: rebuilt-ranks-${{ github.run_id }}
          path: testing

      - name: Run A0 A1 A5 after LLM completion
        working-directory: testing
        run: |
          mkdir -p "$OUT_ROOT"
          python -u A0_equal_weight.py \
            --panel rank_panel.csv \
            --out-root "$OUT_ROOT" \
            --start-date "$START_DECISION_DATE" \
            --end-date "$END_DECISION_DATE"
          python -u A1_rule_based_rank_allocator.py \
            --panel rank_panel.csv \
            --out-root "$OUT_ROOT" \
            --top-k "$TOP_K_VALUES" \
            --start-date "$START_DECISION_DATE" \
            --end-date "$END_DECISION_DATE"
          python -u A5_bayesian_winner_loser_allocator.py \
            --panel rank_panel.csv \
            --out-root "$OUT_ROOT" \
            --top-k "$TOP_K_VALUES" \
            --start-date "$START_DECISION_DATE" \
            --end-date "$END_DECISION_DATE"

      - name: Upload non-LLM state for commit
        uses: actions/upload-artifact@v4
        with:
          name: etf-rank-non-llm-state-${{ github.run_id }}
          path: |
            testing/backtest_state/out_2024_kofr_decision_regime_a0_a6_k10/A0/
            testing/backtest_state/out_2024_kofr_decision_regime_a0_a6_k10/A1_k10/
            testing/backtest_state/out_2024_kofr_decision_regime_a0_a6_k10/A5_k10/
          if-no-files-found: error
          retention-days: 14

  commit-non-llm-state:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [prepare-ranks, non-llm-backtest]
    if: needs.prepare-ranks.outputs.phase == 'nonllm'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Download non-LLM state
        uses: actions/download-artifact@v4
        with:
          name: etf-rank-non-llm-state-${{ github.run_id }}
          path: testing/backtest_state/out_2024_kofr_decision_regime_a0_a6_k10

      - name: Update non-LLM state
        run: |
          python - <<'PY'
          import json, os, time
          from pathlib import Path
          state_path = Path("testing") / os.environ["NON_LLM_STATE_PATH"]
          state_path.parent.mkdir(parents=True, exist_ok=True)
          state = {
              "complete": True,
              "start_decision_date": os.environ["START_DECISION_DATE"],
              "end_decision_date": os.environ["END_DECISION_DATE"],
              "phase": "non_llm_a0_a1_a5",
              "out_root": "testing/backtest_state/out_2024_kofr_decision_regime_a0_a6_k10",
              "run_id": os.environ["GITHUB_RUN_ID"],
              "updated_at": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
          }
          state_path.write_text(json.dumps(state, ensure_ascii=False, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY

      - name: Commit non-LLM state
        id: commit_state
        run: *commit_and_push
        env:
          COMMIT_MESSAGE: "ci: save decision-regime A0/A1/A5 state"

      - name: Trigger final A6
        if: steps.commit_state.outputs.committed == '1'
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
        run: *dispatch_next

  final-a6-report:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: prepare-ranks
    if: needs.prepare-ranks.outputs.phase == 'final'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip pandas numpy matplotlib openpyxl

      - name: Download rebuilt ranks
        uses: actions/download-artifact@v4
        with:
          name: rebuilt-ranks-${{ github.run_id }}
          path: testing

      - name: Run A6 and final report
        working-directory: testing
        run: |
          python -u A6_bayesian_online_expert_allocator.py \
            --mode selected \
            --top-k 10 \
            --rank-panel rank_panel.csv \
            --out-root "$OUT_ROOT/A6" \
            --expert-out-root "$OUT_ROOT" \
            --start-date "$START_DECISION_DATE" \
            --end-date "$END_DECISION_DATE"
          python -u build_final_backtest_report.py \
            --out-root "$OUT_ROOT" \
            --rank-panel rank_panel.csv \
            --report-dir backtest_state/final_report_2024_kofr_decision_regime_a0_a6 \
            --models A0,A1,A2a,A2b,A3,A4,A5,A6

      - name: Commit final A6 report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add testing/backtest_state
          if git diff --cached --quiet; then
            echo "No final backtest changes to commit."
            exit 0
          fi
          git commit -m "ci: save final decision-regime A0-A6 report"
          git pull --rebase --autostash origin "${{ github.ref_name }}"
          git push origin "HEAD:${{ github.ref_name }}"
